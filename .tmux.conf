# === База ===
set -g mouse on
set -g renumber-windows on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g escape-time 0

# === Статус-бар ===
set -g status-position bottom
set -g status-style "fg=colour231,bg=colour236"
# set -g status-left-length 40
# set -g status-right-length 60
# set -g status-interval 5

set -g status-left "#[fg=colour136,bg=colour236] #S #[fg=colour236,bg=colour238,nobold]▶"
set -g status-right "#[fg=colour238,bg=colour236,nobold]◀#[fg=colour231,bg=colour238] %d.%m %H:%M"

setw -g window-status-format "#[fg=colour244,bg=colour236] #I:#W "
setw -g window-status-current-format "#[fg=colour231,bg=colour136,bold] #I:#W "

set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour136"

# === Копирование (vi-стиль) ===
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

run '~/.tmux/plugins/tpm/tpm'
